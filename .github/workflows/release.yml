name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            qt-host: mac
            qt-target: desktop
            cpack-generator: DragNDrop
          - platform: windows
            os: windows-latest
            qt-host: windows
            qt-target: desktop
            cpack-generator: NSIS
          - platform: linux
            os: ubuntu-latest
            qt-host: linux
            qt-target: desktop
            cpack-generator: DEB
    steps:
      - uses: actions/checkout@v5
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: ${{ matrix.qt-host }}
          target: ${{ matrix.qt-target }}
          modules: qtpdf
          cache: true
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress
      - name: Configure native project
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DDUPLEXPRINT_BUILD_TESTS=ON -DDUPLEXPRINT_REQUIRE_QT_APP=ON
      - name: Build native project
        run: cmake --build build --config Release
      - name: Test native core
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Package native app
        shell: bash
        run: |
          cpack --config build/CPackConfig.cmake -G "${{ matrix.cpack-generator }}" -B build/packages
          mkdir -p release
          find build/packages -maxdepth 1 -type f \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) \
            -exec cp {} release/ \;
          if [ ! "$(find release -maxdepth 1 -type f | wc -l)" -gt 0 ]; then
            echo "No installable package was produced." >&2
            exit 1
          fi
      - name: Generate checksums
        shell: bash
        run: |
          cd release
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 * > "SHA256SUMS-${{ matrix.platform }}.txt"
          else
            sha256sum * > "SHA256SUMS-${{ matrix.platform }}.txt"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: help-me-print-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
