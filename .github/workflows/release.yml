name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            qt-host: mac
            qt-target: desktop
            cpack-generator: DragNDrop
          - platform: windows
            os: windows-latest
            qt-host: windows
            qt-target: desktop
            cpack-generator: NSIS
          - platform: linux
            os: ubuntu-latest
            qt-host: linux
            qt-target: desktop
            cpack-generator: DEB
    steps:
      - uses: actions/checkout@v5
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: ${{ matrix.qt-host }}
          target: ${{ matrix.qt-target }}
          modules: qtpdf
          cache: true
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis --no-progress
      - name: Configure native project
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUPLEXPRINT_BUILD_TESTS=ON \
            -DDUPLEXPRINT_REQUIRE_QT_APP=ON \
            -DDUPLEXPRINT_VERSION="${version}"
      - name: Build native project
        run: cmake --build build --config Release
      - name: Test native core
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Package native app
        shell: bash
        run: |
          cpack --config build/CPackConfig.cmake -G "${{ matrix.cpack-generator }}" -B build/packages
          mkdir -p release
          find build/packages -maxdepth 1 -type f \
            \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) \
            -exec cp {} release/ \;
          if [ ! "$(find release -maxdepth 1 -type f | wc -l)" -gt 0 ]; then
            echo "No installable package was produced." >&2
            exit 1
          fi
      - name: Generate checksums
        shell: bash
        run: |
          cd release
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 * > "SHA256SUMS-${{ matrix.platform }}.txt"
          else
            sha256sum * > "SHA256SUMS-${{ matrix.platform }}.txt"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: help-me-print-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*

  publish-homebrew:
    name: Publish Homebrew Cask
    needs: github-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Check configuration
        id: config
        env:
          TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          if [ -n "$TAP_REPOSITORY" ] && [ -n "$TAP_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Homebrew publishing is skipped because HOMEBREW_TAP_REPOSITORY or HOMEBREW_TAP_TOKEN is missing."
          fi
      - name: Resolve release metadata
        if: steps.config.outputs.enabled == 'true'
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          release_tag="$RELEASE_TAG"
          version="${release_tag#v}"
          asset_url="$(gh release view "$release_tag" --json assets --jq '.assets[] | select(.name | endswith(".dmg")) | .browser_download_url' | head -n 1)"
          asset_name="$(gh release view "$release_tag" --json assets --jq '.assets[] | select(.name | endswith(".dmg")) | .name' | head -n 1)"
          gh release download "$release_tag" --pattern "$asset_name" --dir /tmp/cask-asset
          sha="$(shasum -a 256 "/tmp/cask-asset/$asset_name" | awk '{print $1}')"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "url=$asset_url" >> "$GITHUB_OUTPUT"
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"
      - name: Prepare tap checkout
        if: steps.config.outputs.enabled == 'true'
        id: tap
        env:
          TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          remote_url="https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPOSITORY}.git"
          default_branch="$(git ls-remote --symref "$remote_url" HEAD | awk '/^ref:/ {sub("refs/heads/", "", $2); print $2}')"
          if [ -n "$default_branch" ]; then
            git clone --branch "$default_branch" --depth 1 "$remote_url" tap
            echo "branch=$default_branch" >> "$GITHUB_OUTPUT"
          else
            mkdir -p tap
            git -C tap init
            git -C tap checkout -b main
            git -C tap remote add origin "$remote_url"
            echo "branch=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Write cask
        if: steps.config.outputs.enabled == 'true'
        run: |
          mkdir -p tap/Casks
          cat > tap/Casks/help-me-print.rb <<'RUBY'
          cask "help-me-print" do
            version "__VERSION__"
            sha256 "__SHA256__"

            url "__URL__"
            name "Help Me Print"
            desc "Manual duplex printing for printers without automatic double-sided support"
            homepage "https://github.com/hromau/help-me-print"

            app "Help Me Print.app"
          end
          RUBY
          sed -i "s#__VERSION__#${{ steps.meta.outputs.version }}#g" tap/Casks/help-me-print.rb
          sed -i "s#__SHA256__#${{ steps.meta.outputs.sha256 }}#g" tap/Casks/help-me-print.rb
          sed -i "s#__URL__#${{ steps.meta.outputs.url }}#g" tap/Casks/help-me-print.rb
      - name: Commit and push
        if: steps.config.outputs.enabled == 'true'
        working-directory: tap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/help-me-print.rb
          git commit -m "Update Help Me Print to ${{ steps.meta.outputs.version }}" || exit 0
          git push origin "${{ steps.tap.outputs.branch }}"

  publish-apt:
    name: Publish APT Repository
    needs: github-release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v5
      - name: Check configuration
        id: config
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          APT_REPOSITORY: ${{ vars.APT_REPOSITORY }}
          APT_REPOSITORY_TOKEN: ${{ secrets.APT_REPOSITORY_TOKEN }}
        run: |
          if [ -n "$APT_GPG_PRIVATE_KEY" ] && [ -n "$APT_REPOSITORY" ] && [ -n "$APT_REPOSITORY_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "APT publishing is skipped because APT_GPG_PRIVATE_KEY, APT_REPOSITORY, or APT_REPOSITORY_TOKEN is missing."
          fi
      - name: Prepare gh-pages worktree
        if: steps.config.outputs.enabled == 'true'
        env:
          APT_REPOSITORY: ${{ vars.APT_REPOSITORY }}
          APT_REPOSITORY_TOKEN: ${{ secrets.APT_REPOSITORY_TOKEN }}
        run: |
          remote_url="https://x-access-token:${APT_REPOSITORY_TOKEN}@github.com/${APT_REPOSITORY}.git"
          if git ls-remote --exit-code --heads "$remote_url" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --depth 1 "$remote_url" pages
          else
            mkdir -p pages
            git -C pages init
            git -C pages checkout --orphan gh-pages
            git -C pages remote add origin "$remote_url"
          fi
      - name: Download deb
        if: steps.config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          mkdir -p /tmp/apt-assets
          gh release download "$RELEASE_TAG" --pattern "*.deb" --dir /tmp/apt-assets
      - name: Import signing key
        if: steps.config.outputs.enabled == 'true'
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          printf 'pinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
      - name: Build apt repository
        if: steps.config.outputs.enabled == 'true'
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y apt-utils dpkg-dev
          mkdir -p pages/apt/pool/main/h/help-me-print pages/apt/dists/stable/main/binary-amd64
          cp /tmp/apt-assets/*.deb pages/apt/pool/main/h/help-me-print/
          cd pages/apt
          dpkg-scanpackages --arch amd64 pool > dists/stable/main/binary-amd64/Packages
          gzip -kf dists/stable/main/binary-amd64/Packages
          apt-ftparchive release dists/stable > dists/stable/Release
          gpg --batch --yes --pinentry-mode loopback --clearsign -o dists/stable/InRelease dists/stable/Release
          gpg --batch --yes --pinentry-mode loopback -abs -o dists/stable/Release.gpg dists/stable/Release
      - name: Commit and push
        if: steps.config.outputs.enabled == 'true'
        working-directory: pages
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apt
          git commit -m "Publish apt package for ${RELEASE_TAG}" || exit 0
          git push origin gh-pages

  publish-winget:
    name: Publish Winget
    needs: github-release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Check configuration
        id: config
        shell: bash
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          WINGET_AUTOMATION_ENABLED: ${{ vars.WINGET_AUTOMATION_ENABLED }}
        run: |
          if [ -n "$WINGET_TOKEN" ] && [ "$WINGET_AUTOMATION_ENABLED" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$WINGET_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Winget publishing is skipped because WINGET_AUTOMATION_ENABLED is not set to true."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Winget publishing is skipped because WINGET_TOKEN is missing."
          fi
      - name: Explain first submission requirement
        if: steps.config.outputs.enabled != 'true'
        shell: bash
        run: |
          cat <<'EOF'
          WinGet Releaser only updates existing package identifiers.
          For the first release of Easure.HelpMePrint, create the initial manifest in microsoft/winget-pkgs manually.
          After that initial submission is merged, set repository variable WINGET_AUTOMATION_ENABLED=true, rerun this workflow, and future releases can be automated.
          EOF
      - uses: vedantmgoyal2009/winget-releaser@v2
        if: steps.config.outputs.enabled == 'true'
        with:
          identifier: Easure.HelpMePrint
          installers-regex: '\.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
