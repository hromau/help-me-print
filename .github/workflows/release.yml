name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Package ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.allow_failure }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: mac
            os: macos-latest
            qt-host: mac
            qt-target: desktop
            cpack-generator: DragNDrop
            allow_failure: true
          - platform: windows
            os: windows-latest
            qt-host: windows
            qt-target: desktop
            cpack-generator: NSIS
            allow_failure: false
          - platform: linux
            os: ubuntu-latest
            qt-host: linux
            qt-target: desktop
            cpack-generator: DEB
            allow_failure: false
    steps:
      - uses: actions/checkout@v5
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.2"
          host: ${{ matrix.qt-host }}
          target: ${{ matrix.qt-target }}
          modules: qtpdf
          cache: true
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev fakeroot
      - name: Install Windows packaging tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install nsis --no-progress
          $nsisBin = Join-Path ${env:ProgramFiles(x86)} "NSIS"
          $makensis = Join-Path $nsisBin "makensis.exe"
          if (-not (Test-Path $makensis)) {
            throw "NSIS compiler was not installed at $makensis"
          }
          $nsisBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Configure native project
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cmake -S . -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DDUPLEXPRINT_BUILD_TESTS=ON \
            -DDUPLEXPRINT_REQUIRE_QT_APP=ON \
            -DDUPLEXPRINT_VERSION="${version}"
      - name: Build native project
        run: cmake --build build --config Release
      - name: Test native core
        run: ctest --test-dir build --output-on-failure -C Release
      - name: Configure macOS signing
        if: runner.os == 'macOS'
        id: macos_signing
        shell: bash
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_APP_PASSWORD: ${{ secrets.MACOS_NOTARY_APP_PASSWORD }}
        run: |
          if [ -n "$MACOS_CERTIFICATE_NAME" ] && [ -n "$MACOS_CERTIFICATE_P12" ] && [ -n "$MACOS_CERTIFICATE_PASSWORD" ] && [ -n "$MACOS_NOTARY_APPLE_ID" ] && [ -n "$MACOS_NOTARY_TEAM_ID" ] && [ -n "$MACOS_NOTARY_APP_PASSWORD" ]; then
            cert_path="$RUNNER_TEMP/help-me-print-signing.p12"
            keychain_path="$RUNNER_TEMP/help-me-print-signing.keychain-db"
            keychain_password="$(uuidgen)"
            if ! printf '%s' "$MACOS_CERTIFICATE_P12" | base64 --decode > "$cert_path" 2>/dev/null; then
              printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$cert_path"
            fi
            security create-keychain -p "$keychain_password" "$keychain_path"
            security set-keychain-settings -lut 21600 "$keychain_path"
            security unlock-keychain -p "$keychain_password" "$keychain_path"
            security import "$cert_path" -P "$MACOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
            security list-keychains -d user -s "$keychain_path"
            security default-keychain -d user -s "$keychain_path"
            security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
            xcrun notarytool store-credentials help-me-print-notary \
              --apple-id "$MACOS_NOTARY_APPLE_ID" \
              --team-id "$MACOS_NOTARY_TEAM_ID" \
              --password "$MACOS_NOTARY_APP_PASSWORD"
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "macOS signing/notarization secrets are not configured; unsigned .dmg will be built and Homebrew publish will be skipped."
          fi
      - name: Configure Windows signing
        if: runner.os == 'Windows'
        id: windows_signing
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          if ($env:WINDOWS_CERTIFICATE_PFX -and $env:WINDOWS_CERTIFICATE_PASSWORD) {
            $certPath = Join-Path $env:RUNNER_TEMP "help-me-print-signing.pfx"
            [System.IO.File]::WriteAllBytes($certPath, [System.Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "cert_path=$certPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "Windows signing secrets are not configured; unsigned .exe will be built."
          }
      - name: Package native app
        shell: bash
        env:
          MACOS_CERTIFICATE_NAME: ${{ secrets.MACOS_CERTIFICATE_NAME }}
          MACOS_NOTARY_PROFILE: help-me-print-notary
        run: |
          set -euo pipefail
          mkdir -p release
          if [ "$RUNNER_OS" = "macOS" ]; then
            rm -rf stage
            cmake --install build --prefix stage
            if [ "${{ steps.macos_signing.outputs.enabled }}" != "true" ]; then
              unset MACOS_CERTIFICATE_NAME
              unset MACOS_NOTARY_PROFILE
            fi
            ./scripts/package_macos_release.sh stage/help-me-print.app release
          else
            cpack --config build/CPackConfig.cmake -G "${{ matrix.cpack-generator }}" -B build/packages
            echo "Packaged files produced by CPack:"
            find build/packages -type f | sort
            while IFS= read -r package_path; do
              cp "$package_path" release/
            done < <(
              find build/packages -type f \
                \( -name "*.dmg" -o -name "*.exe" -o -name "*.deb" \) \
                | sort
            )
          fi
          if [ ! "$(find release -maxdepth 1 -type f | wc -l)" -gt 0 ]; then
            echo "No installable package was produced." >&2
            exit 1
          fi
      - name: Sign Windows installer
        if: runner.os == 'Windows' && steps.windows_signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $signtool = (Get-Command signtool.exe -ErrorAction Stop).Source
          $installer = Get-ChildItem -Path release -Filter *.exe | Select-Object -First 1
          if (-not $installer) {
            throw "No .exe installer found in release directory."
          }
          & $signtool sign `
            /fd SHA256 `
            /td SHA256 `
            /tr http://timestamp.digicert.com `
            /f "${{ steps.windows_signing.outputs.cert_path }}" `
            /p "$env:WINDOWS_CERTIFICATE_PASSWORD" `
            /d "Help Me Print" `
            /du "https://github.com/${{ github.repository }}" `
            $installer.FullName
          & $signtool verify /pa /v $installer.FullName
      - name: Validate Linux package
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          deb_path="$(find release -maxdepth 1 -type f -name '*.deb' | head -n 1)"
          if [ -z "$deb_path" ]; then
            echo "No .deb package found in release directory." >&2
            exit 1
          fi
          dpkg-deb --info "$deb_path" >/dev/null
          dpkg-deb --contents "$deb_path" >/dev/null
      - name: Write validation metadata
        shell: bash
        run: |
          set -euo pipefail
          case "$RUNNER_OS" in
            macOS)
              asset_path="$(find release -maxdepth 1 -type f -name '*.dmg' | head -n 1)"
              if [ "${{ steps.macos_signing.outputs.enabled }}" = "true" ]; then
                distributable=true
                reason="signed and notarized macOS dmg"
              else
                distributable=false
                reason="missing macOS signing/notarization secrets"
              fi
              platform=mac
              ;;
            Windows)
              asset_path="$(find release -maxdepth 1 -type f -name '*.exe' | head -n 1)"
              if [ "${{ steps.windows_signing.outputs.enabled }}" = "true" ]; then
                distributable=true
                reason="signed Windows installer"
              else
                distributable=true
                reason="unsigned Windows installer"
              fi
              platform=windows
              ;;
            Linux)
              asset_path="$(find release -maxdepth 1 -type f -name '*.deb' | head -n 1)"
              distributable=true
              reason="validated deb package"
              platform=linux
              ;;
          esac
          asset_name="$(basename "$asset_path")"
          cat > "release/validation-${platform}.json" <<EOF
          {
            "platform": "${platform}",
            "asset_name": "${asset_name}",
            "distributable": ${distributable},
            "reason": "${reason}"
          }
          EOF
      - name: Generate checksums
        shell: bash
        run: |
          cd release
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 * > "SHA256SUMS-${{ matrix.platform }}.txt"
          else
            sha256sum * > "SHA256SUMS-${{ matrix.platform }}.txt"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: help-me-print-${{ matrix.platform }}
          path: release/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: artifacts/*
