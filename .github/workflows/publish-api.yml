name: Publish Easure API

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "api/**"
      - ".github/workflows/publish-api.yml"

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Deploy Azure Function
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - name: Check configuration
        id: config
        env:
          FUNCTION_APP_NAME: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          AZURE_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
        run: |
          if [ -n "$FUNCTION_APP_NAME" ] && [ -n "$AZURE_CLIENT_ID" ] && [ -n "$AZURE_TENANT_ID" ] && [ -n "$AZURE_SUBSCRIPTION_ID" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Azure Function deployment is skipped because AZURE_FUNCTIONAPP_NAME, AZURE_CLIENT_ID, AZURE_TENANT_ID, or AZURE_SUBSCRIPTION_ID is missing."
          fi
        working-directory: .
      - uses: actions/checkout@v4
        if: steps.config.outputs.enabled == 'true'
      - uses: azure/login@v2
        if: steps.config.outputs.enabled == 'true'
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - uses: actions/setup-dotnet@v4
        if: steps.config.outputs.enabled == 'true'
        with:
          dotnet-version: 9.0.x
      - run: dotnet restore Easure.PrintProfiles.Api.csproj
        if: steps.config.outputs.enabled == 'true'
      - run: dotnet test tests/Easure.PrintProfiles.Api.Tests.csproj --configuration Release
        if: steps.config.outputs.enabled == 'true'
      - run: dotnet publish Easure.PrintProfiles.Api.csproj --configuration Release --output publish
        if: steps.config.outputs.enabled == 'true'
      - uses: azure/functions-action@v1
        if: steps.config.outputs.enabled == 'true'
        with:
          app-name: ${{ vars.AZURE_FUNCTIONAPP_NAME }}
          package: api/publish
